<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alimesaj</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- REGISTER SCREEN -->
  <div id="registerScreen" class="screen active">
    <div class="register-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="orb orb3"></div>
    </div>
    <div class="register-card">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <h1>Alimesaj</h1>
        <p>Anlık mesajlaşmanın yeni adresi</p>
      </div>
      <div class="form-group">
        <label>Adın</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="regName" placeholder="Adın ve Soyadın" autocomplete="off" />
        </div>
      </div>
      <div class="form-group">
        <label>Telefon Numarası</label>
        <div class="input-wrap">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" id="regPhone" placeholder="+90 555 000 00 00" autocomplete="off" />
        </div>
      </div>
      <button class="btn-primary" id="registerBtn">
        <span>Başla</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
      <p class="login-hint">Zaten hesabın var mı? <span id="goLogin">Giriş yap</span></p>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen">
    <div class="register-bg">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
    </div>
    <div class="register-card">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <h1>Alimesaj</h1>
        <p>Tekrar hoş geldin</p>
      </div>
      <div class="form-group">
        <label>Telefon Numarası</label>
        <div class="input-wrap">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" id="loginPhone" placeholder="+90 555 000 00 00" autocomplete="off" />
        </div>
      </div>
      <button class="btn-primary" id="loginBtn">
        <span>Giriş Yap</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>
      <p class="login-hint">Hesabın yok mu? <span id="goRegister">Kayıt ol</span></p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appScreen" class="screen">
    <div class="app-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <i class="fa-solid fa-bolt"></i>
            <span>Alimesaj</span>
          </div>
          <button class="icon-btn" id="logoutBtn" title="Çıkış Yap">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </div>

        <div class="user-profile-mini">
          <div class="avatar" id="myAvatar">A</div>
          <div>
            <div class="user-name" id="myName">—</div>
            <div class="user-phone" id="myPhone">—</div>
          </div>
        </div>

        <div class="search-section">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="tel" id="searchPhone" placeholder="Telefon numarası ara..." autocomplete="off" />
          </div>
          <button class="btn-search" id="searchBtn">
            <i class="fa-solid fa-user-plus"></i>
          </button>
        </div>

        <div class="conversations-list" id="conversationsList">
          <div class="empty-state">
            <i class="fa-solid fa-comments"></i>
            <p>Henüz sohbet yok</p>
            <small>Bir numara ara ve mesajlaş</small>
          </div>
        </div>
      </aside>

      <!-- CHAT AREA -->
      <main class="chat-area" id="chatArea">
        <div class="chat-welcome">
          <div class="welcome-icon">
            <i class="fa-solid fa-bolt"></i>
          </div>
          <h2>Alimesaj'a Hoş Geldin</h2>
          <p>Sol taraftan bir kişi seç veya telefon numarasıyla ara</p>
        </div>
      </main>

    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- CONTEXT MENU -->
  <div id="contextMenu" class="context-menu">
    <button id="ctxEdit"><i class="fa-solid fa-pen"></i> Düzenle</button>
    <button id="ctxDelete"><i class="fa-solid fa-trash"></i> Sil</button>
    <button id="ctxClose"><i class="fa-solid fa-xmark"></i> Kapat</button>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="modal-overlay">
    <div class="modal-card">
      <h3>Mesajı Düzenle</h3>
      <textarea id="editInput" rows="3"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="editCancel">İptal</button>
        <button class="btn-primary small" id="editSave">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
